name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WiX Toolset 3.14
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.14.1.20250415 --no-progress -y

          $candidate = @(
            Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending |
              ForEach-Object { Join-Path $_.FullName "bin" }

            if ($env:ChocolateyInstall) {
              Get-ChildItem (Join-Path $env:ChocolateyInstall "lib") -Directory -Filter "wixtoolset*" -ErrorAction SilentlyContinue |
                ForEach-Object {
                  @(
                    Join-Path $_.FullName "tools"
                    Join-Path $_.FullName "bin"
                    Join-Path $_.FullName "tools\\bin"
                  )
                }
            }
          ) |
            Where-Object { Test-Path (Join-Path $_ "candle.exe") } |
            Select-Object -First 1

          if (-not $candidate) {
            throw "Unable to locate WiX Toolset binaries after installation."
          }

          $candidate | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Get-Command heat.exe, candle.exe, light.exe | Format-Table Name, Source -AutoSize

      - name: Restore
        run: dotnet restore PackagingTools.sln

      - name: Build
        run: dotnet build PackagingTools.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/PackagingTools.IntegrationTests/PackagingTools.IntegrationTests.csproj -c Release --no-build --logger "trx;LogFileName=integration-tests-${{ runner.os }}.trx" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results-${{ runner.os }}
          path: test-results/
          if-no-files-found: error
          retention-days: 7

  pack-and-publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: validate
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore PackagingTools.sln

      - name: Pack NuGet packages
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.value }}"
          projects=(
            "src/PackagingTools.Core/PackagingTools.Core.csproj"
            "src/PackagingTools.Core.Windows/PackagingTools.Core.Windows.csproj"
            "src/PackagingTools.Core.Mac/PackagingTools.Core.Mac.csproj"
            "src/PackagingTools.Core.Linux/PackagingTools.Core.Linux.csproj"
            "src/PackagingTools.Plugins/PackagingTools.Plugins.csproj"
            "src/PackagingTools.Sdk/PackagingTools.Sdk.csproj"
            "src/PackagingTools.Cli/PackagingTools.Cli.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet pack "$project" -c Release --no-restore -o artifacts/nuget /p:Version="$version"
          done

      - name: List packages
        shell: bash
        run: ls -la artifacts/nuget

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-release
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
          if-no-files-found: error
          retention-days: 30

      - name: Push packages to NuGet.org
        if: ${{ env.NUGET_API_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          for package in artifacts/nuget/*.nupkg artifacts/nuget/*.snupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PackagingTools ${{ steps.version.outputs.value }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
