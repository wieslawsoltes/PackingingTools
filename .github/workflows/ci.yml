name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore PackagingTools.sln

      - name: Build
        run: dotnet build PackagingTools.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/PackagingTools.IntegrationTests/PackagingTools.IntegrationTests.csproj -c Release --no-build --logger "trx;LogFileName=integration-tests-${{ runner.os }}.trx" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ runner.os }}
          path: test-results/
          if-no-files-found: error
          retention-days: 7

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore PackagingTools.sln

      - name: Pack NuGet packages
        shell: bash
        run: |
          set -euo pipefail

          projects=(
            "src/PackagingTools.Core/PackagingTools.Core.csproj"
            "src/PackagingTools.Core.Windows/PackagingTools.Core.Windows.csproj"
            "src/PackagingTools.Core.Mac/PackagingTools.Core.Mac.csproj"
            "src/PackagingTools.Core.Linux/PackagingTools.Core.Linux.csproj"
            "src/PackagingTools.Plugins/PackagingTools.Plugins.csproj"
            "src/PackagingTools.Sdk/PackagingTools.Sdk.csproj"
            "src/PackagingTools.Cli/PackagingTools.Cli.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet pack "$project" -c Release --no-restore -o artifacts/nuget
          done

      - name: List packages
        shell: bash
        run: ls -la artifacts/nuget

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
          if-no-files-found: error
          retention-days: 7
